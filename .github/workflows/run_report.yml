name: Genera report CF importi

on:
  workflow_dispatch:

  schedule:
    # GitHub Actions usa orario UTC.
    # 06:00 UTC = 08:00 Italia con ora legale
    # 12:00 UTC = 14:00 Italia con ora legale
    - cron: "0 6,12 * * *"

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest

    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}

      DATA_INIZIO: "2025-10-01 00:00:00"
      DATA_FINE: "2026-07-03 00:00:00"
      STATO_TICKET: ""
      SOLO_IMPORTO_PAGATO_POSITIVO: "true"

      OUTPUT_DIR: "output"
      OUTPUT_FILE_NAME: "report_cf_importi.csv"
      CSV_SEPARATOR: ";"
      CSV_DECIMAL: ","

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esegui script
        run: |
          python 65_GitHub_cf_rischiosi.py

      - name: Verifica file generato
        run: |
          ls -la output
          test -f output/report_cf_importi.csv

      - name: Salva CSV nella repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -f output/report_cf_importi.csv

          if git diff --cached --quiet; then
            echo "Nessuna modifica al CSV da salvare."
          else
            git commit -m "Aggiornamento automatico report CF importi"
            git push
          fi

      - name: Carica CSV anche come artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-cf-importi
          path: output/report_cf_importi.csv
